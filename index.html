<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Controlo Total v3</title>
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3209/3209105.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --p: #2ecc71; --bg: #f4f7f6; --txt: #2c3e50; --danger: #e74c3c; --accent: #3498db; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--txt); display: flex; flex-direction: column; align-items: center; padding: 20px 0; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 1.5rem; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; width: 85%; max-width: 320px; margin-bottom: 15px; box-sizing: border-box;}
        h1 { font-size: 0.9rem; opacity: 0.5; text-transform: uppercase; margin: 0; }
        #contador { font-size: 5rem; font-weight: 800; margin: 5px 0; color: var(--p); line-height: 1; }
        .btn-add { background: var(--p); border: none; color: white; border-radius: 50%; width: 75px; height: 75px; font-size: 2.5rem; cursor: pointer; margin: 15px auto; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 20px rgba(46,204,113,0.3); }
        .btn-reset { font-size: 0.7rem; color: #bbb; cursor: pointer; text-decoration: underline; margin-top: 10px; display: block; }
        .history-title { font-weight: bold; font-size: 0.8rem; margin-bottom: 15px; display: block; color: var(--accent); border-bottom: 1px solid #f0f0f0; padding-bottom: 8px; text-transform: uppercase; text-align: left; }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.85rem; }
        /* Estilo do Gráfico */
        .chart-container { margin-top: 20px; height: 200px; position: relative; }
        /* Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; visibility: hidden; opacity: 0; transition: 0.3s; z-index: 100; backdrop-filter: blur(4px); }
        .modal-overlay.active { visibility: visible; opacity: 1; }
        .modal { background: white; width: 85%; max-width: 300px; padding: 1.5rem; border-radius: 25px; text-align: center; }
        .trigger-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-trigger { background: #f8f9f9; border: 1px solid #eee; padding: 12px; border-radius: 12px; font-weight: bold; font-size: 0.85rem; cursor: pointer; }
        .pos-refeicao { grid-column: span 2; background: #e8f8f0; color: var(--p); }
    </style>
</head>
<body>

    <div class="card">
        <h1>Hoje</h1>
        <div id="contador">0</div>
        <button class="btn-add" onclick="abrirModal()">+</button>
        <span class="btn-reset" onclick="resetarDia()">Reiniciar dia</span>
    </div>

    <div class="card">
        <span class="history-title">Resumo 30 Dias</span>
        <div class="stat-row"><span>Total:</span> <span id="total-30" style="font-weight:bold">0</span></div>
        <div class="stat-row"><span>Poupança:</span> <span id="poupanca-30" style="color:var(--p); font-weight:bold">0.00€</span></div>
        
        <div class="chart-container">
            <canvas id="meuGrafico"></canvas>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h3 style="margin:0">O que causou este?</h3>
            <div class="trigger-options">
                <button class="btn-trigger" onclick="registar('Stress')">Stress</button>
                <button class="btn-trigger" onclick="registar('Café')">Café</button>
                <button class="btn-trigger" onclick="registar('Tédio')">Tédio</button>
                <button class="btn-trigger" onclick="registar('Hábito')">Hábito</button>
                <button class="btn-trigger pos-refeicao" onclick="registar('Pós-refeição')">Pós-refeição</button>
            </div>
            <span class="btn-reset" style="color:var(--danger); margin-top:20px" onclick="fecharModal()">Cancelar</span>
        </div>
    </div>

    <script>
        const PRECO_UNID = 0.25;
        const META_DIARIA = 20;
        const HOJE = new Date().toISOString().split('T')[0];
        let dados = JSON.parse(localStorage.getItem('dadosCigarros')) || {};
        let meuChart = null; // Variável para o gráfico

        if (!dados[HOJE]) dados[HOJE] = { total: 0, gatilhos: {} };

        function abrirModal() { document.getElementById('modalOverlay').classList.add('active'); }
        function fecharModal() { document.getElementById('modalOverlay').classList.remove('active'); }

        function atualizarDisplay() {
            document.getElementById('contador').innerText = dados[HOJE].total;

            // Lógica 30 dias e Gatilhos
            let total30 = 0;
            let gatilhosAcumulados = {};
            const datas = Object.keys(dados).sort().reverse().slice(0, 30);

            datas.forEach(d => {
                total30 += dados[d].total;
                for (let [g, q] of Object.entries(dados[d].gatilhos)) {
                    gatilhosAcumulados[g] = (gatilhosAcumulados[g] || 0) + q;
                }
            });

            document.getElementById('total-30').innerText = total30;
            const poupanca = ((META_DIARIA * datas.length) - total30) * PRECO_UNID;
            document.getElementById('poupanca-30').innerText = (poupanca > 0 ? poupanca : 0).toFixed(2) + "€";

            localStorage.setItem('dadosCigarros', JSON.stringify(dados));
            desenharGrafico(gatilhosAcumulados);
        }

        function desenharGrafico(dadosGatilhos) {
            const ctx = document.getElementById('meuGrafico').getContext('2d');
            const labels = Object.keys(dadosGatilhos);
            const valores = Object.values(dadosGatilhos);

            if (meuChart) meuChart.destroy(); // Limpa o gráfico antigo antes de criar novo

            if (labels.length === 0) return; // Não desenha se não houver dados

            meuChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: valores,
                        backgroundColor: ['#3498db', '#f1c40f', '#e74c3c', '#9b59b6', '#2ecc71'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } }
                    }
                }
            });
        }

        function registar(g) {
            dados[HOJE].total++;
            dados[HOJE].gatilhos[g] = (dados[HOJE].gatilhos[g] || 0) + 1;
            atualizarDisplay();
            fecharModal();
        }

        function resetarDia() {
            if(confirm("Zerar hoje?")) {
                dados[HOJE] = { total: 0, gatilhos: {} };
                atualizarDisplay();
            }
        }

        atualizarDisplay();
    </script>
</body>
</html>
