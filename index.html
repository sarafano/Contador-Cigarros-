<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Controlo de Tabaco</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --bg: #1a1a1a; --card: #2d2d2d; --txt: #eee; --p: #2ecc71; --blue: #3498db; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--txt); margin: 0; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        .main-card { background: var(--card); padding: 40px 20px; border-radius: 40px; text-align: center; width: 100%; max-width: 350px; margin-top: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        #contador { font-size: 8rem; font-weight: 800; color: var(--p); margin: 10px 0; line-height: 1; }
        
        .btn-add { background: var(--p); border: none; color: white; border-radius: 50%; width: 110px; height: 110px; font-size: 4rem; cursor: pointer; box-shadow: 0 0 20px rgba(46, 204, 113, 0.4); margin-top: 20px; }
        .btn-stats { background: var(--blue); color: white; width: 100%; padding: 15px; border-radius: 20px; text-decoration: none; font-weight: bold; margin-top: 30px; display: block; }
        
        /* ESTILO DO MODAL DE GATILHOS */
        #modalGatilhos { display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: #222; padding: 30px 20px; border-radius: 30px 30px 0 0; box-shadow: 0 -10px 40px rgba(0,0,0,0.5); z-index: 100; text-align: center; box-sizing: border-box; }
        .grid-gatilhos { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .btn-g { background: #333; border: 1px solid #444; color: white; padding: 15px; border-radius: 15px; font-size: 1rem; }
        .btn-cancel { margin-top: 20px; color: #888; background: none; border: none; }
    </style>
</head>
<body>

    <div class="main-card">
        <small style="opacity: 0.6; letter-spacing: 2px;">HOJE</small>
        <div id="contador">0</div>
        <div id="display-tempo" style="color: var(--blue); margin-bottom: 20px;">A contar...</div>
        <button class="btn-add" onclick="abrirModal()">+</button>
    </div>

    <a href="stats.html" class="btn-stats">📊 Estatísticas Detalhadas</a>

    <div id="modalGatilhos">
        <h3>Qual foi o gatilho?</h3>
        <div class="grid-gatilhos">
            <button class="btn-g" onclick="registar('Café')">☕ Café</button>
            <button class="btn-g" onclick="registar('Pós-refeição')">🍽️ Pós-Refeição</button>
            <button class="btn-g" onclick="registar('Hábito')">🔄 Hábito</button>
            <button class="btn-g" onclick="registar('Tédio')">😴 Tédio</button>
            <button class="btn-g" onclick="registar('Stress')">⚡ Stress</button>
            <button class="btn-g" onclick="registar('Outro')">❓ Outro</button>
        </div>
        <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
    </div>

    <script src="app.js"></script>
    <script>
        function abrirModal() { document.getElementById('modalGatilhos').style.display = 'block'; }
        function fecharModal() { document.getElementById('modalGatilhos').style.display = 'none'; }
    </script>
</body>
</html>
