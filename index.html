<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controlo de Tabaco</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --txt: #ffffff; --blue: #3498db; --p: #2ecc71; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--txt); margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        
        .container { text-align: center; width: 90%; max-width: 400px; }
        .counter { font-size: 5rem; font-weight: 800; margin: 20px 0; color: var(--blue); }
        .label { font-size: 1.2rem; color: #888; text-transform: uppercase; letter-spacing: 2px; }

        .btn-add { 
            background: var(--blue); border: none; width: 150px; height: 150px; 
            border-radius: 50%; color: white; font-size: 3rem; font-weight: bold;
            box-shadow: 0 10px 30px rgba(52, 152, 219, 0.4); cursor: pointer;
            transition: transform 0.1s; -webkit-tap-highlight-color: transparent;
        }
        .btn-add:active { transform: scale(0.9); }

        .nav-links { margin-top: 50px; display: flex; gap: 20px; }
        .nav-links a { color: #888; text-decoration: none; font-size: 0.9rem; font-weight: bold; padding: 10px 20px; border: 1px solid #333; border-radius: 15px; }
        
        .last-reg { margin-top: 20px; font-size: 0.8rem; color: #555; }
    </style>
</head>
<body>

    <div class="container">
        <div class="label">Hoje</div>
        <div id="display-total" class="counter">0</div>
        
        <button class="btn-add" onclick="registarCigarro()">+</button>
        
        <div id="last-time" class="last-reg">Nenhum registo hoje</div>

        <div class="nav-links">
            <a href="stats.html">Estatísticas</a>
            <a href="progresso.html" style="color: #cd7f32; border-color: #cd7f32;">🏆 Progresso</a>
        </div>
    </div>

    <script>
        // Configurações básicas
        const DATA_CORTA = "2026-04-01"; // Data definida por ti para início da contagem

        function registarCigarro() {
            const agora = new Date();
            const dataIso = agora.toISOString().split('T')[0];
            const horaAtual = agora.getHours().toString().padStart(2, '0') + ":" + 
                             agora.getMinutes().toString().padStart(2, '0');

            let dados = JSON.parse(localStorage.getItem('dadosCigarros')) || {};

            // Inicializa o dia se não existir
            if (!dados[dataIso]) {
                dados[dataIso] = { total: 0, horas: [] };
            }

            // Garante que a estrutura de 'horas' existe (importante para o gráfico de períodos)
            if (!dados[dataIso].horas) {
                dados[dataIso].horas = [];
            }

            // Incrementa o total e guarda a hora exata
            dados[dataIso].total += 1;
            dados[dataIso].horas.push(horaAtual);

            // Guarda no telemóvel
            localStorage.setItem('dadosCigarros', JSON.stringify(dados));
            
            atualizarInterface();
        }

        function atualizarInterface() {
            const dataIso = new Date().toISOString().split('T')[0];
            const dados = JSON.parse(localStorage.getItem('dadosCigarros')) || {};
            
            const totalHoje = dados[dataIso] ? dados[dataIso].total : 0;
            document.getElementById('display-total').innerText = totalHoje;

            if (dados[dataIso] && dados[dataIso].horas && dados[dataIso].horas.length > 0) {
                const ultimaHora = dados[dataIso].horas[dados[dataIso].horas.length - 1];
                document.getElementById('last-time').innerText = "Último registo às " + ultimaHora;
            }
        }

        // Executa ao abrir a página
        atualizarInterface();
    </script>
</body>
</html>
