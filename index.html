<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meu Controlo v2</title>
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3209/3209105.png">
    <style>
        :root { --p: #2ecc71; --bg: #f4f7f6; --txt: #2c3e50; --danger: #e74c3c; }
        body { font-family: sans-serif; background: var(--bg); color: var(--txt); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; width: 85%; max-width: 320px; }
        h1 { font-size: 1.1rem; margin-bottom: 0.5rem; opacity: 0.6; text-transform: uppercase; }
        #contador { font-size: 6rem; font-weight: 800; margin: 0.5rem 0; color: var(--p); }
        .btn-add { background: var(--p); border: none; color: white; border-radius: 50%; width: 85px; height: 85px; font-size: 3rem; cursor: pointer; box-shadow: 0 8px 20px rgba(46,204,113,0.4); margin: 1.5rem auto; display: flex; align-items: center; justify-content: center; }
        .stats { margin-top: 1.5rem; font-size: 0.95rem; border-top: 1px solid #eee; padding-top: 1.5rem; display: flex; flex-direction: column; gap: 0.5rem; }
        .stat-item { display: flex; justify-content: space-between; }
        .stat-val { font-weight: 600; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; visibility: hidden; opacity: 0; transition: 0.3s; z-index: 100; }
        .modal-overlay.active { visibility: visible; opacity: 1; }
        .modal { background: white; width: 85%; max-width: 300px; padding: 2rem; border-radius: 25px; }
        .trigger-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-trigger { background: #f0f3f2; border: 1px solid #ddd; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .pos-refeicao { grid-column: span 2; background: #e8f8f0; color: var(--p); border-color: var(--p); }
        .reset-link { margin-top: 20px; display: block; color: #999; font-size: 0.8rem; text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Cigarros Hoje</h1>
        <div id="contador">0</div>
        <button class="btn-add" onclick="abrirModal()">+</button>
        <div class="stats">
            <div class="stat-item"><span>Gasto (hoje):</span> <span class="stat-val"><span id="gasto">0.00</span>€</span></div>
            <div class="stat-item"><span>Gatilho:</span> <span class="stat-val" id="top-gatilho">-</span></div>
        </div>
        <span class="reset-link" onclick="resetarDia()">Reiniciar dia</span>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2 style="margin-top:0">Porquê este?</h2>
            <div class="trigger-options">
                <button class="btn-trigger" onclick="registarCigarro('Stress')">Stress</button>
                <button class="btn-trigger" onclick="registarCigarro('Café')">Café</button>
                <button class="btn-trigger" onclick="registarCigarro('Tédio')">Tédio</button>
                <button class="btn-trigger" onclick="registarCigarro('Hábito')">Hábito</button>
                <button class="btn-trigger pos-refeicao" onclick="registarCigarro('Pós-refeição')">Pós-refeição</button>
            </div>
            <span class="reset-link" onclick="fecharModal()">Cancelar</span>
        </div>
    </div>
        <script>
        const PRECO = 0.25; 
        const HOJE = new Date().toISOString().split('T')[0];
        let dados = JSON.parse(localStorage.getItem('dadosCigarros')) || {};

        if (!dados[HOJE]) dados[HOJE] = { total: 0, gatilhos: {} };

        function abrirModal() { document.getElementById('modalOverlay').classList.add('active'); }
        function fecharModal() { document.getElementById('modalOverlay').classList.remove('active'); }

        function atualizarDisplay() {
            const d = dados[HOJE];
            document.getElementById('contador').innerText = d.total;
            document.getElementById('gasto').innerText = (d.total * PRECO).toFixed(2);
            
            let top = '-', max = 0;
            for (const [g, q] of Object.entries(d.gatilhos)) {
                if (q > max) { max = q; top = g; }
            }
            document.getElementById('top-gatilho').innerText = max > 0 ? `${top} (${Math.round(max/d.total*100)}%)` : "-";
            localStorage.setItem('dadosCigarros', JSON.stringify(dados));
        }

        function registarCigarro(g) {
            dados[HOJE].total++;
            dados[HOJE].gatilhos[g] = (dados[HOJE].gatilhos[g] || 0) + 1;
            atualizarDisplay();
            fecharModal();
        }

        function resetarDia() {
            if(confirm("Apagar registos de hoje?")) {
                dados[HOJE] = { total: 0, gatilhos: {} };
                atualizarDisplay();
            }
        }
        atualizarDisplay();
    </script>
</body>
</html>
