<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Controlo de Tabaco</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --bg: #1a1a1a; --card: #2d2d2d; --txt: #eee; --p: #2ecc71; --blue: #3498db; --danger: #e74c3c; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--txt); margin: 0; display: flex; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; min-height: 100vh; }
        .header-top { width: 100%; max-width: 350px; display: flex; justify-content: flex-end; margin-bottom: 10px; }
        .btn-sos { background: none; border: 1px solid #f39c12; color: #f39c12; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 0.8rem; text-decoration: none; }
        .main-card { background: var(--card); padding: 30px 20px; border-radius: 40px; text-align: center; width: 100%; max-width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        #contador { font-size: 8rem; font-weight: 800; color: var(--p); margin: 5px 0; line-height: 1; }
        #display-tempo { color: var(--blue); margin-bottom: 20px; font-size: 0.9rem; background: rgba(52, 152, 219, 0.1); padding: 8px 15px; border-radius: 20px; display: inline-block; }
        .controles-principais { display: flex; align-items: center; justify-content: center; gap: 20px; margin-top: 10px; }
        .btn-add { background: var(--p); border: none; color: white; border-radius: 50%; width: 80px; height: 80px; font-size: 3rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-sub { background: var(--danger); border: none; color: white; border-radius: 50%; width: 50px; height: 50px; font-size: 2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .bottom-panel { background: var(--card); padding: 25px 20px; border-radius: 40px; width: 100%; max-width: 350px; margin-top: 20px; display: flex; flex-direction: column; gap: 15px; }
        .btn-primary { background: var(--blue); color: white; padding: 15px; border-radius: 20px; text-decoration: none; font-weight: bold; text-align: center; display: block; }
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-outline { background: none; border: 1px solid #555; color: #aaa; padding: 12px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; }
        .btn-restore { background: none; border: 1px solid var(--blue); color: var(--blue); padding: 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header-top"><a href="#" class="btn-sos" onclick="alert('Respira fundo!')">SOS 🔥</a></div>
    <div class="main-card">
        <small style="opacity: 0.6; font-weight: bold;">HOJE</small>
        <div id="contador">0</div>
        <div id="display-tempo">A contar...</div>
        <div class="controles-principais">
            <button class="btn-sub" onclick="remover()">-</button>
            <button class="btn-add" onclick="registar()">+</button>
        </div>
    </div>
    <div class="bottom-panel">
        <a href="stats.html" class="btn-primary">📊 Estatísticas Detalhadas</a>
        <div class="btn-row">
            <button class="btn-outline" onclick="exportarParaFicheiro()">💾 Backup</button>
            <button class="btn-outline" onclick="exportarEmail()">📧 Email</button>
        </div>
        <button class="btn-restore" onclick="importarBackup()">📥 Restaurar de Ficheiro</button>
        <button style="background:none; border:none; color:#555; font-size:0.7rem; margin-top:10px;" onclick="reiniciarDia()">Reiniciar dia</button>
    </div>
    <script src="app.js"></script>
</body>
</html>
