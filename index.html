<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controlo de Tabaco</title>
    <style>
        :root { --bg: #121212; --card: #222222; --txt: #ffffff; --green: #2ecc71; --red: #e74c3c; --blue: #3498db; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        /* Card Principal */
        .main-card { background: var(--card); width: 100%; max-width: 400px; border-radius: 35px; padding: 40px 20px; text-align: center; margin-top: 20px; box-sizing: border-box; }
        .label-hoje { font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
        .counter { font-size: 8rem; font-weight: bold; color: var(--green); line-height: 1; margin: 10px 0; }
        .limpo-txt { background: rgba(52, 152, 219, 0.1); color: var(--blue); padding: 8px 20px; border-radius: 20px; font-size: 0.9rem; display: inline-block; margin-bottom: 30px; }

        /* Botões de Ação */
        .controls { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 20px; }
        .btn-circle { border: none; border-radius: 50%; color: white; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; }
        .btn-plus { width: 90px; height: 90px; background: var(--green); font-size: 2.5rem; box-shadow: 0 0 20px rgba(46, 204, 113, 0.3); }
        .btn-minus { width: 60px; height: 60px; background: var(--red); font-size: 1.5rem; opacity: 0.8; }

        /* Botões Inferiores */
        .menu-container { width: 100%; max-width: 400px; margin-top: 25px; display: flex; flex-direction: column; gap: 12px; }
        .btn-wide { background: var(--card); border: 1px solid #333; color: white; padding: 18px; border-radius: 20px; text-decoration: none; font-size: 0.9rem; font-weight: bold; text-align: center; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; }
        .btn-blue { background: var(--blue); border: none; }
        .grid-half { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        .sos-btn { position: absolute; top: 25px; right: 20px; background: none; border: 1px solid #f39c12; color: #f39c12; padding: 5px 15px; border-radius: 15px; font-size: 0.8rem; text-decoration: none; }
    </style>
</head>
<body>


    <div class="main-card">
        <div class="label-hoje">HOJE</div>
        <div id="display-total" class="counter">0</div>
        
        <div id="limpo-box" class="limpo-txt">Limpo há: <span id="tempo-limpo">0h 0m</span></div>

        <div class="controls">
            <button class="btn-circle btn-minus" onclick="removerCigarro()">-</button>
            <button class="btn-circle btn-plus" onclick="adicionarCigarro()">+</button>
        </div>
    </div>

    <div class="menu-container">
        <a href="stats.html" class="btn-wide btn-blue">📊 Estatísticas Detalhadas</a>
        
        <div class="grid-half">
            <div onclick="fazerBackup()" class="btn-wide">💾 Backup</div>
            <div onclick="enviarEmail()" class="btn-wide">📧 Email</div>
        </div>

        <div onclick="restaurarFicheiro()" class="btn-wide" style="border-color: var(--blue); color: var(--blue);">
            🏆 Restaurar de Ficheiro
        </div>
        
        <div onclick="reiniciarDia()" style="color: #444; font-size: 1.7rem; text-align: center; margin-top: 10px; cursor: pointer;">Reiniciar dia</div>
    </div>

    <script>
        function adicionarCigarro() {
            const agora = new Date();
            const dataIso = agora.toISOString().split('T')[0];
            const horaAtual = agora.getHours().toString().padStart(2, '0') + ":" + 
                             agora.getMinutes().toString().padStart(2, '0');

            let dados = JSON.parse(localStorage.getItem('dadosCigarros')) || {};

            if (!dados[dataIso]) {
                dados[dataIso] = { total: 0, horas: [] };
            }
            if (!dados[dataIso].horas) dados[dataIso].horas = [];

            dados[dataIso].total += 1;
            dados[dataIso].horas.push(horaAtual);

            localStorage.setItem('dadosCigarros', JSON.stringify(dados));
            atualizarInterface();
        }

        function removerCigarro() {
            const dataIso = new Date().toISOString().split('T')[0];
            let dados = JSON.parse(localStorage.getItem('dadosCigarros')) || {};

            if (dados[dataIso] && dados[dataIso].total > 0) {
                dados[dataIso].total -= 1;
                if (dados[dataIso].horas) dados[dataIso].horas.pop();
                localStorage.setItem('dadosCigarros', JSON.stringify(dados));
                atualizarInterface();
            }
        }

        function atualizarInterface() {
            const agora = new Date();
            const dataIso = agora.toISOString().split('T')[0];
            const dados = JSON.parse(localStorage.getItem('dadosCigarros')) || {};
            
            const diaAtual = dados[dataIso] || { total: 0, horas: [] };
            document.getElementById('display-total').innerText = diaAtual.total;

            if (diaAtual.horas && diaAtual.horas.length > 0) {
                const ultimaHoraStr = diaAtual.horas[diaAtual.horas.length - 1];
                const [h, m] = ultimaHoraStr.split(':');
                const ultimaData = new Date();
                ultimaData.setHours(h, m, 0);

                const diffMs = agora - ultimaData;
                const diffHoras = Math.floor(diffMs / (1000 * 60 * 60));
                const diffMins = Math.floor((diffMs / (1000 * 60)) % 60);
                document.getElementById('tempo-limpo').innerText = diffHoras + "h " + diffMins + "m";
            } else {
                document.getElementById('tempo-limpo').innerText = "---";
            }
        }

        function fazerBackup() {
            const dados = localStorage.getItem('dadosCigarros');
            if (!dados) return alert("Não há dados para exportar.");
            const blob = new Blob([dados], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'backup_tabaco.json';
            a.click();
        }

        function restaurarFicheiro() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = e => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = readerEvent => {
                    const content = readerEvent.target.result;
                    try {
                        JSON.parse(content);
                        localStorage.setItem('dadosCigarros', content);
                        alert("Dados restaurados com sucesso!");
                        location.reload();
                    } catch (err) {
                        alert("Ficheiro inválido.");
                    }
                }
                reader.readAsText(file);
            }
            input.click();
        }

        function enviarEmail() {
            const dados = localStorage.getItem('dadosCigarros');
            const corpo = encodeURIComponent("Dados de Backup: \n\n" + dados);
            window.location.href = `mailto:?subject=Backup Tabaco&body=${corpo}`;
        }

        function reiniciarDia() {
            if(confirm("Reiniciar os dados de hoje?")) {
                const dataIso = new Date().toISOString().split('T')[0];
                let dados = JSON.parse(localStorage.getItem('dadosCigarros')) || {};
                delete dados[dataIso];
                localStorage.setItem('dadosCigarros', JSON.stringify(dados));
                atualizarInterface();
            }
        }

        setInterval(atualizarInterface, 60000);
        atualizarInterface();
    </script>
</body>
</html>
