<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Controlo 30 Dias</title>
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3209/3209105.png">
    <style>
        :root { --p: #2ecc71; --bg: #f4f7f6; --txt: #2c3e50; --danger: #e74c3c; --accent: #3498db; }
        body { font-family: sans-serif; background: var(--bg); color: var(--txt); display: flex; flex-direction: column; align-items: center; padding: 20px 0; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 1.5rem; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; width: 85%; max-width: 320px; margin-bottom: 20px; }
        h1 { font-size: 1rem; opacity: 0.6; text-transform: uppercase; margin-bottom: 0; }
        #contador { font-size: 5rem; font-weight: 800; margin: 0; color: var(--p); }
        .btn-add { background: var(--p); border: none; color: white; border-radius: 50%; width: 75px; height: 75px; font-size: 2.5rem; cursor: pointer; margin: 10px auto; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(46,204,113,0.3); }
        
        /* Secção 30 Dias */
        .history-card { background: #fff; width: 85%; max-width: 320px; border-radius: 20px; padding: 1.5rem; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .history-title { font-weight: bold; font-size: 0.9rem; margin-bottom: 15px; display: block; color: var(--accent); border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.9rem; }
        .poupanca { color: var(--p); font-weight: bold; }
        
        /* Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; visibility: hidden; opacity: 0; transition: 0.3s; z-index: 100; }
        .modal-overlay.active { visibility: visible; opacity: 1; }
        .modal { background: white; width: 85%; max-width: 300px; padding: 1.5rem; border-radius: 20px; }
        .trigger-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn-trigger { background: #f8f9f9; border: 1px solid #ddd; padding: 12px; border-radius: 10px; font-weight: bold; font-size: 0.8rem; }
        .pos-refeicao { grid-column: span 2; background: #e8f8f0; color: var(--p); }
        .reset-link { margin-top: 15px; display: block; color: #bbb; font-size: 0.7rem; text-decoration: underline; text-align: center; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Hoje</h1>
        <div id="contador">0</div>
        <button class="btn-add" onclick="abrirModal()">+</button>
        <div class="stat-row" style="margin-top:10px">
            <span>Gatilho principal:</span>
            <span id="top-gatilho" style="font-weight:bold">-</span>
        </div>
    </div>
<div style="margin-bottom: 15px; font-size: 0.7rem; color: #bbb; cursor: pointer; text-decoration: underline;" onclick="resetarDia()">
    Reiniciar o dia de hoje
</div>
    <div class="history-card">
        <span class="history-title">RESUMO ÚLTIMOS 30 DIAS</span>
        <div class="stat-row">
            <span>Total fumados:</span>
            <span id="total-30" style="font-weight:bold">0</span>
        </div>
        <div class="stat-row">
            <span>Média diária:</span>
            <span id="media-30" style="font-weight:bold">0</span>
        </div>
        <div class="stat-row">
            <span>Dinheiro gasto:</span>
            <span id="gasto-30" style="color:var(--danger); font-weight:bold">0.00€</span>
        </div>
        <div class="stat-row" style="border-top: 1px dashed #eee; pt: 10px; margin-top: 10px;">
            <span>Dinheiro poupado*:</span>
            <span id="poupanca-30" class="poupanca">0.00€</span>
        </div>
        <p style="font-size: 0.6rem; color: #aaa; margin: 5px 0 0 0;">*Baseado na tua meta de redução (ex: comparado a 20/dia)</p>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h3 style="margin-top:0">Motivo:</h3>
            <div class="trigger-options">
                <button class="btn-trigger" onclick="registar('Stress')">Stress</button>
                <button class="btn-trigger" onclick="registar('Café')">Café</button>
                <button class="btn-trigger" onclick="registar('Tédio')">Tédio</button>
                <button class="btn-trigger" onclick="registar('Hábito')">Hábito</button>
                <button class="btn-trigger pos-refeicao" onclick="registar('Pós-refeição')">Pós-refeição</button>
            </div>
            <span class="reset-link" onclick="fecharModal()">Cancelar</span>
        </div>
    </div>
        <script>
        const PRECO = 0.25; 
        const META_DIARIA = 20; // Quantos fumavas antes? (Para calcular a poupança)
        const HOJE = new Date().toISOString().split('T')[0];
        let dados = JSON.parse(localStorage.getItem('dadosCigarros')) || {};

        if (!dados[HOJE]) dados[HOJE] = { total: 0, gatilhos: {} };

        function abrirModal() { document.getElementById('modalOverlay').classList.add('active'); }
        function fecharModal() { document.getElementById('modalOverlay').classList.remove('active'); }

        function atualizarDisplay() {
            // Atualiza Hoje
            const d = dados[HOJE];
            document.getElementById('contador').innerText = d.total;
            
            let top = '-', max = 0;
            for (const [g, q] of Object.entries(d.gatilhos)) {
                if (q > max) { max = q; top = g; }
            }
            document.getElementById('top-gatilho').innerText = max > 0 ? top : "-";

            // Cálculos 30 dias
            calcularTrintaDias();
            localStorage.setItem('dadosCigarros', JSON.stringify(dados));
        }

        function calcularTrintaDias() {
            let total30 = 0;
            let diasComRegisto = 0;
            const datas = Object.keys(dados).sort().reverse();
            const ultimas30 = datas.slice(0, 30);

            ultimas30.forEach(data => {
                total30 += dados[data].total;
                diasComRegisto++;
            });

            const gasto30 = total30 * PRECO;
            // Poupança: (Meta - Real) * Preço
            const poupanca30 = ((META_DIARIA * diasComRegisto) - total30) * PRECO;

            document.getElementById('total-30').innerText = total30;
            document.getElementById('media-30').innerText = diasComRegisto > 0 ? (total30 / diasComRegisto).toFixed(1) : 0;
            document.getElementById('gasto-30').innerText = gasto30.toFixed(2) + "€";
            document.getElementById('poupanca-30').innerText = (poupanca30 > 0 ? poupanca30 : 0).toFixed(2) + "€";
        }

        function registar(g) {
            dados[HOJE].total++;
            dados[HOJE].gatilhos[g] = (dados[HOJE].gatilhos[g] || 0) + 1;
            atualizarDisplay();
            fecharModal();
        }

        atualizarDisplay();
            function resetarDia() {
    if(confirm("Tens a certeza? Isto vai apagar todos os registos de HOJE.")) {
        dados[HOJE] = { total: 0, gatilhos: {} };
        localStorage.setItem('dadosCigarros', JSON.stringify(dados));
        atualizarDisplay();
    }
                    }
    </script>
</body>
</html>
