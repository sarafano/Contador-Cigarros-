<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meu Controlo v8</title>
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3209/3209105.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --p: #2ecc71; --bg: #f8f9fa; --card-bg: #ffffff; --txt: #2c3e50; --danger: #e74c3c; --blue: #3498db; --sos: #f39c12; --muted: #aaa; }
        @media (prefers-color-scheme: dark) {
            :root { --bg: #1a1a1a; --card-bg: #2d2d2d; --txt: #ecf0f1; --muted: #888; }
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--txt); display: flex; flex-direction: column; align-items: center; padding: 20px 0; min-height: 100vh; margin: 0; transition: 0.3s; }
        .card { background: var(--card-bg); padding: 1.5rem; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 360px; margin-bottom: 20px; box-sizing: border-box; position: relative; }
        h1 { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        #contador { font-size: 5rem; font-weight: 800; color: var(--p); line-height: 1; margin: 5px 0; }
        .btn-add { background: var(--p); border: none; color: white; border-radius: 50%; width: 80px; height: 80px; font-size: 2.5rem; cursor: pointer; display: flex; align-items: center; justify-content: center; margin: 15px auto; box-shadow: 0 10px 20px rgba(46, 204, 113, 0.3); }
        .btn-sos { position: absolute; top: 15px; right: 15px; background: none; border: 1px solid var(--sos); color: var(--sos); border-radius: 20px; padding: 5px 12px; font-size: 0.7rem; font-weight: bold; }
        .resumo-title { color: var(--blue); font-weight: bold; font-size: 0.85rem; text-transform: uppercase; display: block; margin-bottom: 15px; border-bottom: 1px solid var(--bg); padding-bottom: 8px; }
        .chart-container { margin-top: 15px; height: 160px; width: 100%; }
        .btn-backup { width: 100%; background: var(--blue); border: none; color: white; padding: 12px; border-radius: 20px; font-weight: bold; margin-top: 15px; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; visibility: hidden; opacity: 0; transition: 0.3s; z-index: 100; backdrop-filter: blur(5px); }
        .modal-overlay.active { visibility: visible; opacity: 1; }
        .modal { background: var(--card-bg); width: 85%; max-width: 310px; padding: 25px; border-radius: 25px; text-align: center; }
        .trigger-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-opt { background: var(--bg); border: 1px solid rgba(0,0,0,0.05); padding: 15px; border-radius: 15px; font-weight: bold; color: var(--txt); }
    </style>
</head>
<body>
    <div class="card">
        <button class="btn-sos" onclick="abrirSOS()">SOS 🔥</button>
        <h1>HOJE</h1>
        <div id="contador">0</div>
        <button class="btn-add" onclick="abrirModal()">+</button>
        <div style="font-size: 0.85rem; color: var(--muted);">Gatilho: <span id="top-gatilho" style="font-weight:bold;">-</span> | Vida: <span id="vida-hoje" style="color:var(--danger)">0min</span></div>
    </div>

    <div class="card" style="text-align: left;">
        <span class="resumo-title">Progresso 7 Dias (Cigarros)</span>
        <div class="chart-container"><canvas id="graficoSemanal"></canvas></div>
    </div>

    <div class="card" style="text-align: left;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <span class="resumo-title" style="margin:0; border:0; padding:0;">Análise Mensal</span>
            <select id="seletorMes" onchange="atualizarEstatisticasMensais()" style="border:none; background:var(--bg); border-radius:8px; padding:3px 8px; font-size:0.75rem; color:var(--blue); font-weight:bold;"></select>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.85rem; margin-bottom:15px;">
            <div style="background:var(--bg); padding:10px; border-radius:12px;">Mês: <b id="total-mes">0</b></div>
            <div style="background:var(--bg); padding:10px; border-radius:12px;">Custo: <b id="gasto-mes" style="color:var(--danger)">0€</b></div>
        </div>
        <div class="chart-container" style="height:140px;"><canvas id="graficoGatilhos"></canvas></div>
        <button class="btn-backup" onclick="exportarDados()">📧 Enviar Backup</button>
    </div>
        <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h3 style="margin:0">Motivo:</h3>
            <div class="trigger-grid">
                <button class="btn-opt" onclick="registar('Stress')">Stress</button>
                <button class="btn-opt" onclick="registar('Café')">Café</button>
                <button class="btn-opt" onclick="registar('Tédio')">Tédio</button>
                <button class="btn-opt" onclick="registar('Hábito')">Hábito</button>
                <button class="btn-opt" style="grid-column: span 2; background: #e8f8f0; color:#2ecc71" onclick="registar('Pós-refeição')">Pós-refeição</button>
            </div>
            <div style="margin-top:20px; color:var(--danger); font-size:0.8rem;" onclick="fecharModal()">CANCELAR</div>
        </div>
    </div>
    <div class="modal-overlay" id="modalSOS">
        <div class="modal">
            <h3 style="color:var(--sos); margin-top:0;">Aguenta Firme!</h3>
            <p id="frase-sos" style="font-size: 1rem;"></p>
            <button class="btn-opt" style="width:100%; background:var(--sos); color:white; border:none;" onclick="fecharSOS()">Eu consigo!</button>
        </div>
    </div>

    <script>
        const PRECO = 0.25; const MIN_CIG = 11; const HOJE = new Date().toISOString().split('T')[0];
        let dados = JSON.parse(localStorage.getItem('dadosCigarros')) || {};
        let chartGatilhos = null; let chartSemanal = null;
        if (!dados[HOJE]) dados[HOJE] = { total: 0, gatilhos: {} };

        function abrirModal() { document.getElementById('modalOverlay').classList.add('active'); }
        function fecharModal() { document.getElementById('modalOverlay').classList.remove('active'); }
        function abrirSOS() { 
            const frases = ["O teu pulmão agradece!", "Bebe água gelada agora.", "A vontade dura só 3 min.", "Tu és mais forte que o vício."];
            document.getElementById('frase-sos').innerText = frases[Math.floor(Math.random()*frases.length)];
            document.getElementById('modalSOS').classList.add('active'); 
        }
        function fecharSOS() { document.getElementById('modalSOS').classList.remove('active'); }

        function atualizar() {
            document.getElementById('contador').innerText = dados[HOJE].total;
            document.getElementById('vida-hoje').innerText = (dados[HOJE].total * MIN_CIG) + "min";
            
            let topG = '-', max = 0;
            for (let [g, q] of Object.entries(dados[HOJE].gatilhos)) { if(q > max) { max = q; topG = g; } }
            document.getElementById('top-gatilho').innerText = max > 0 ? topG : "-";

            popularSeletor(); 
            atualizarEstatisticasMensais();
            renderGraficoSemanal();
            localStorage.setItem('dadosCigarros', JSON.stringify(dados));
        }

        function popularSeletor() {
            const seletor = document.getElementById('seletorMes');
            const meses = [...new Set(Object.keys(dados).map(d => d.substring(0, 7)))].sort().reverse();
            seletor.innerHTML = meses.map(m => `<option value="${m}" ${m===HOJE.substring(0,7)?'selected':''}>${m}</option>`).join('');
        }

        function atualizarEstatisticasMensais() {
            const mesSel = document.getElementById('seletorMes').value;
            let total = 0, gatilhos = {};
            Object.keys(dados).filter(d => d.startsWith(mesSel)).forEach(d => {
                total += dados[d].total;
                for (let [g, q] of Object.entries(dados[d].gatilhos)) { gatilhos[g] = (gatilhos[g] || 0) + q; }
            });
            document.getElementById('total-mes').innerText = total;
            document.getElementById('gasto-mes').innerText = (total * PRECO).toFixed(2) + "€";
            renderChartGatilhos(gatilhos);
        }

        function renderGraficoSemanal() {
            const ctx = document.getElementById('graficoSemanal').getContext('2d');
            if (chartSemanal) chartSemanal.destroy();
            
            let labels = []; let valores = [];
            for (let i = 6; i >= 0; i--) {
                let d = new Date(); d.setDate(d.getDate() - i);
                let iso = d.toISOString().split('T')[0];
                labels.push(d.getDate() + "/" + (d.getMonth()+1));
                valores.push(dados[iso] ? dados[iso].total : 0);
            }

            chartSemanal = new Chart(ctx, {
                type: 'bar',
                data: { labels: labels, datasets: [{ label: 'Cigarros', data: valores, backgroundColor: '#3498db', borderRadius: 5 }] },
                options: { 
                    maintainAspectRatio: false, 
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
                }
            });
        }

        function renderChartGatilhos(obj) {
            const ctx = document.getElementById('graficoGatilhos').getContext('2d');
            if (chartGatilhos) chartGatilhos.destroy();
            const labels = Object.keys(obj); if (labels.length === 0) return;
            chartGatilhos = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: labels, datasets: [{ data: Object.values(obj), backgroundColor: ['#3498db', '#f1c40f', '#e74c3c', '#9b59b6', '#2ecc71'], borderWidth: 0 }] },
                options: { maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { boxWidth: 10, font: { size: 9 } } } } }
            });
        }

        function registar(g) { dados[HOJE].total++; dados[HOJE].gatilhos[g] = (dados[HOJE].gatilhos[g] || 0) + 1; fecharModal(); atualizar(); }
        function resetarDia() { if(confirm("Zerar hoje?")) { dados[HOJE] = { total: 0, gatilhos: {} }; atualizar(); } }
        function exportarDados() {
            let txt = "BACKUP CONTROLO:\n";
            Object.keys(dados).forEach(k => txt += `${k}: ${dados[k].total}\n`);
            window.location.href = `mailto:?subject=Backup Tabaco&body=${encodeURIComponent(txt)}`;
        }
        atualizar();
    </script>
</body>
</html>
