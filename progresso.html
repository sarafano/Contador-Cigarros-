<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progresso - Controlo</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --txt: #ffffff; --blue: #3498db; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { width: 100%; max-width: 400px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-voltar { background: #333; color: white; padding: 8px 15px; border-radius: 10px; text-decoration: none; font-size: 0.8rem; }
        .pb-container { background: var(--card); width: 100%; max-width: 400px; padding: 20px; border-radius: 25px; text-align: center; margin-bottom: 20px; box-sizing: border-box; }
        .pb-card { background: linear-gradient(145deg, #a8704d, #7a4a2e); padding: 25px; border-radius: 20px; position: relative; }
        .pb-time { font-size: 3rem; font-weight: bold; margin: 5px 0; }
        .chart-box { background: var(--card); width: 100%; max-width: 400px; padding: 20px; border-radius: 25px; box-sizing: border-box; }
        h3 { font-size: 0.7rem; color: #888; text-transform: uppercase; margin-bottom: 15px; text-align: center; }
        .canvas-container { height: 250px; width: 100%; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="font-size: 1.1rem; margin: 0;">O Teu Progresso</h2>
        <a href="index.html" class="btn-voltar">Voltar</a>
    </div>

    <div class="pb-container">
        <div class="pb-card">
            <span style="font-size:1.5rem; position:absolute; top:-10px; left:46%;">🏆</span>
            <div style="font-size:0.65rem; font-weight:bold; color:rgba(255,255,255,0.8)">MÉDIA DE TEMPO SEM FUMAR</div>
            <div id="media-valor" class="pb-time">0h</div>
            <div style="font-size:0.75rem; color:rgba(255,255,255,0.6)">Desde 01/04/2026</div>
        </div>
    </div>

    <div class="chart-box">
        <h3>Cigarros Totais por Semana</h3>
        <div class="canvas-container">
            <canvas id="chartSemanas"></canvas>
        </div>
    </div>

    <script>
        const dados = JSON.parse(localStorage.getItem('dadosCigarros')) || {};

        function getStartOfWeek(date, weeksAgo = 0) {
            const d = new Date(date);
            const day = d.getDay();
            const diff = d.getDate() - day + (day === 0 ? -6 : 1) - (7 * weeksAgo);
            const start = new Date(d.setDate(diff));
            start.setHours(0, 0, 0, 0);
            return start;
        }

        function atualizar() {
            // 1. MÉDIA (A partir de 01/04)
            let momentos = [];
            Object.keys(dados).filter(d => d >= "2026-04-01").forEach(dataStr => {
                if (dados[dataStr].horas) {
                    dados[dataStr].horas.forEach(h => {
                        const [ano, mes, dia] = dataStr.split('-').map(Number);
                        const [hora, min] = h.split(':').map(Number);
                        momentos.push(new Date(ano, mes-1, dia, hora, min).getTime());
                    });
                }
            });
            momentos.sort((a,b) => a-b);
            let somaI = 0;
            for(let i=1; i<momentos.length; i++) somaI += (momentos[i]-momentos[i-1]);
            const media = momentos.length > 1 ? (somaI / (momentos.length-1) / 3600000).toFixed(1) : "0";
            document.getElementById('media-valor').innerText = media + "h";

            // 2. 4 SEMANAS (Lógica de Segunda a Domingo)
            const hoje = new Date();
            let contagemSemanas = [0, 0, 0, 0];
            const limites = [0, 1, 2, 3].map(w => getStartOfWeek(hoje, w).getTime());

            Object.keys(dados).forEach(dataStr => {
                const [ano, mes, dia] = dataStr.split('-').map(Number);
                const dataReg = new Date(ano, mes-1, dia).getTime();
                const total = dados[dataStr].total || 0;

                for(let i=0; i<4; i++) {
                    if (dataReg >= limites[i] && (i === 0 || dataReg < limites[i-1])) {
                        contagemSemanas[i] += total;
                        break;
                    }
                }
            });

            new Chart(document.getElementById('chartSemanas'), {
                type: 'bar',
                data: {
                    labels: ['3 Sem.', '2 Sem.', 'Passada', 'ESTA'],
                    datasets: [{
                        data: [contagemSemanas[3], contagemSemanas[2], contagemSemanas[1], contagemSemanas[0]],
                        backgroundColor: (c) => c.dataIndex === 3 ? '#3498db' : '#444',
                        borderRadius: 8,
                        barThickness: 30
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#333' }, ticks: { color: '#888' } },
                        x: { grid: { display: false }, ticks: { color: '#fff', font: { weight: 'bold' } } }
                    }
                }
            });
        }
        window.onload = atualizar;
    </script>
</body>
</html>
