<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progresso - Controlo</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #1a1a1a; --card: #2d2d2d; --txt: #eee; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { width: 100%; max-width: 400px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-voltar { background: #444; color: white; padding: 8px 20px; border-radius: 12px; text-decoration: none; font-size: 0.9rem; }
        .pb-container { background: var(--card); width: 100%; max-width: 400px; padding: 20px; border-radius: 25px; text-align: center; margin-bottom: 20px; box-sizing: border-box; }
        .pb-card { background: linear-gradient(145deg, #a8704d, #7a4a2e); padding: 25px; border-radius: 20px; position: relative; }
        .pb-time { font-size: 3rem; font-weight: bold; margin: 5px 0; }
        .chart-box { background: var(--card); width: 100%; max-width: 400px; padding: 20px; border-radius: 25px; box-sizing: border-box; }
        .canvas-container { height: 250px; width: 100%; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="font-size: 1.1rem; margin: 0;">O Teu Progresso</h2>
        <a href="index.html" class="btn-voltar">Voltar</a>
    </div>

    <div class="pb-container">
        <div class="pb-card">
            <span style="font-size:1.5rem; position:absolute; top:-10px; left:46%;">🏆</span>
            <div style="font-size:0.65rem; font-weight:bold; color:rgba(255,255,255,0.8)">MÉDIA DE TEMPO SEM FUMAR</div>
            <div id="media-valor" class="pb-time">...</div>
            <div style="font-size:0.75rem; color:rgba(255,255,255,0.6)">Desde 01/04/2026</div>
        </div>
    </div>

    <div class="chart-box">
        <h3 style="font-size: 0.7rem; color: #888; text-transform: uppercase; text-align: center;">Cigarros Totais por Semana</h3>
        <div class="canvas-container">
            <canvas id="chartSemanas"></canvas>
        </div>
    </div>

    <script>
        const dados = JSON.parse(localStorage.getItem('dadosCigarros')) || {};

        // Função precisa para número da semana
        function getWeek(date) {
            const d = new Date(date);
            d.setHours(0, 0, 0, 0);
            d.setDate(d.getDate() + 4 - (d.getDay() || 7));
            const yearStart = new Date(d.getFullYear(), 0, 1);
            return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        }

        function atualizar() {
            // 1. MÉDIA (Correção do 0h)
            let momentos = [];
            Object.keys(dados).forEach(dataStr => {
                if (dataStr >= "2026-04-01" && dados[dataStr].horas) {
                    const [y, m, d] = dataStr.split('-').map(Number);
                    dados[dataStr].horas.forEach(h => {
                        const [hr, min] = h.split(':').map(Number);
                        momentos.push(new Date(y, m-1, d, hr, min).getTime());
                    });
                }
            });
            momentos.sort((a, b) => a - b);
            let soma = 0;
            for(let i=1; i<momentos.length; i++) soma += (momentos[i]-momentos[i-1]);
            const mediaH = momentos.length > 1 ? (soma / (momentos.length - 1) / 3600000).toFixed(1) : "0";
            document.getElementById('media-valor').innerText = mediaH + "h";

            // 2. GRÁFICO (Semana 14, 13, 12, 11)
            const semanaAtual = getWeek(new Date()); 
            let semanas = {
                [semanaAtual]: 0,
                [semanaAtual-1]: 0,
                [semanaAtual-2]: 0,
                [semanaAtual-3]: 0
            };

            Object.keys(dados).forEach(dataStr => {
                const [y, m, d] = dataStr.split('-').map(Number);
                const s = getWeek(new Date(y, m-1, d));
                if (semanas.hasOwnProperty(s)) {
                    semanas[s] += (dados[dataStr].total || 0);
                }
            });

            new Chart(document.getElementById('chartSemanas'), {
                type: 'bar',
                data: {
                    labels: ['3 Sem.', '2 Sem.', 'Passada', 'ESTA'],
                    datasets: [{
                        data: [semanas[semanaAtual-3], semanas[semanaAtual-2], semanas[semanaAtual-1], semanas[semanaAtual]],
                        backgroundColor: (c) => c.dataIndex === 3 ? '#3498db' : '#555',
                        borderRadius: 10
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#333' }, ticks: { color: '#888' } },
                        x: { grid: { display: false }, ticks: { color: '#fff' } }
                    }
                }
            });
        }
        window.onload = atualizar;
    </script>
</body>
</html>
