<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progresso - Controlo</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --txt: #ffffff; --blue: #3498db; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { width: 100%; max-width: 400px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-voltar { background: #333; color: white; padding: 8px 15px; border-radius: 10px; text-decoration: none; font-size: 0.8rem; }
        .pb-container { background: var(--card); width: 100%; max-width: 400px; padding: 20px; border-radius: 25px; text-align: center; margin-bottom: 20px; box-sizing: border-box; }
        .pb-card { background: linear-gradient(145deg, #a8704d, #7a4a2e); padding: 25px; border-radius: 20px; position: relative; box-shadow: 0 8px 15px rgba(0,0,0,0.4); }
        .pb-time { font-size: 3rem; font-weight: bold; margin: 5px 0; }
        .chart-box { background: var(--card); width: 100%; max-width: 400px; padding: 20px; border-radius: 25px; box-sizing: border-box; }
        h3 { font-size: 0.7rem; color: #888; text-transform: uppercase; margin-bottom: 15px; text-align: center; }
        .canvas-container { height: 250px; width: 100%; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="font-size: 1.1rem; margin: 0;">O Teu Progresso</h2>
        <a href="index.html" class="btn-voltar">Voltar</a>
    </div>

    <div class="pb-container">
        <div class="pb-card">
            <span style="font-size:1.5rem; position:absolute; top:-10px; left:46%;">🏆</span>
            <div style="font-size:0.65rem; font-weight:bold; color:rgba(255,255,255,0.8)">MÉDIA DE TEMPO SEM FUMAR</div>
            <div id="media-valor" class="pb-time">...</div>
            <div style="font-size:0.75rem; color:rgba(255,255,255,0.6)">Desde 01/04/2026</div>
        </div>
    </div>

    <div class="chart-box">
        <h3>Cigarros Totais por Semana</h3>
        <div class="canvas-container">
            <canvas id="chartSemanas"></canvas>
        </div>
    </div>

    <script>
        const dados = JSON.parse(localStorage.getItem('dadosCigarros')) || {};

        function atualizar() {
            // 1. CÁLCULO DA MÉDIA (Inter-Cigarros)
            let todosMomentos = [];
            Object.keys(dados).forEach(dataStr => {
                if (dataStr >= "2026-04-01" && dados[dataStr].horas) {
                    dados[dataStr].horas.forEach(hStr => {
                        // Criar data forçando a interpretação local (ano, mês-1, dia, hora, min)
                        const [ano, mes, dia] = dataStr.split('-').map(Number);
                        const [hora, min] = hStr.split(':').map(Number);
                        todosMomentos.push(new Date(ano, mes - 1, dia, hora, min).getTime());
                    });
                }
            });

            todosMomentos.sort((a, b) => a - b);

            let somaIntervalos = 0;
            let totalIntervalos = 0;
            for (let i = 1; i < todosMomentos.length; i++) {
                somaIntervalos += (todosMomentos[i] - todosMomentos[i-1]);
                totalIntervalos++;
            }

            const mediaHoras = totalIntervalos > 0 ? (somaIntervalos / totalIntervalos / 3600000).toFixed(1) : "0";
            document.getElementById('media-valor').innerText = mediaHoras + "h";

            // 2. CÁLCULO DAS 4 SEMANAS (Lógica de dias relativos)
            let contagemSemanas = [0, 0, 0, 0];
            const hojeLocal = new Date();
            hojeLocal.setHours(0,0,0,0);

            Object.keys(dados).forEach(dataStr => {
                const [ano, mes, dia] = dataStr.split('-').map(Number);
                const dataRegisto = new Date(ano, mes - 1, dia).getTime();
                
                const diffDias = Math.floor((hojeLocal - dataRegisto) / (1000 * 60 * 60 * 24));
                
                if (diffDias >= 0 && diffDias < 7) contagemSemanas[0] += (dados[dataStr].total || 0);
                else if (diffDias >= 7 && diffDias < 14) contagemSemanas[1] += (dados[dataStr].total || 0);
                else if (diffDias >= 14 && diffDias < 21) contagemSemanas[2] += (dados[dataStr].total || 0);
                else if (diffDias >= 21 && diffDias < 28) contagemSemanas[3] += (dados[dataStr].total || 0);
            });

            const ctx = document.getElementById('chartSemanas').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['3 Sem.', '2 Sem.', 'Passada', 'ESTA'],
                    datasets: [{
                        data: [contagemSemanas[3], contagemSemanas[2], contagemSemanas[1], contagemSemanas[0]],
                        backgroundColor: (c) => c.dataIndex === 3 ? '#3498db' : '#444',
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#333' } },
                        x: { grid: { display: false }, ticks: { color: '#fff' } }
                    }
                }
            });
        }

        window.onload = atualizar;
    </script>
</body>
</html>
