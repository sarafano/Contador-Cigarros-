<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progresso - Controlo</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #1a1a1a; --card: #2d2d2d; --txt: #eee; --blue: #3498db; --p: #2ecc71; --danger: #e74c3c; --gold: #cd7f32; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { width: 100%; max-width: 400px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-voltar { background: #444; color: white; padding: 8px 20px; border-radius: 12px; text-decoration: none; font-size: 0.9rem; }
        .pb-container { background: #252525; width: 100%; max-width: 400px; padding: 20px; border-radius: 25px; text-align: center; margin-bottom: 20px; border: 1px solid #333; }
        .pb-card { background: linear-gradient(145deg, #a8704d, #7a4a2e); padding: 30px 20px; border-radius: 25px; position: relative; margin: 0 auto 10px auto; width: 85%; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .pb-time { font-size: 2.2rem; font-weight: 800; color: white; margin: 10px 0; }
        .chart-box { background: var(--card); width: 100%; max-width: 400px; padding: 20px; border-radius: 25px; margin-bottom: 20px; box-sizing: border-box; }
        h3 { font-size: 0.8rem; color: #888; text-align: center; text-transform: uppercase; margin-bottom: 15px; }
        .donut-container { position: relative; height: 200px; width: 100%; }
        .donut-label { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); text-align: center; font-weight: bold; font-size: 0.75rem; color: #888; pointer-events: none; }
    </style>
</head>
<body>
    <div class="header">
        <h2 style="font-size: 1.1rem; margin: 0;">O Teu Progresso</h2>
        <a href="stats.html" class="btn-voltar">Voltar</a>
    </div>

    <div class="pb-container">
        <div class="pb-card">
            <span style="font-size:2rem; position:absolute; top:-15px; left:46%;">⏱️</span>
            <div style="font-size:0.7rem; font-weight:bold; color:rgba(255,255,255,0.8)">MAIOR TEMPO LIMPO</div>
            <div id="pb-value" class="pb-time">0.0h</div>
            <span style="position:absolute; bottom:10px; right:15px; color:#2ecc71; font-size:1.2rem;">✔</span>
        </div>
        <div id="pb-data" style="font-size:0.8rem; color:#888">Desde 01 Abr 2026</div>
    </div>

    <div class="chart-box">
        <h3>Momentos Críticos (05h - 00h)</h3>
        <div class="donut-container">
            <canvas id="chartDonut"></canvas>
            <div class="donut-label">FOCO<br>DIÁRIO</div>
        </div>
        <div id="msg-periodo" style="text-align:center; font-size:0.85rem; margin-top:15px; color:#aaa;">A analisar...</div>
    </div>

    <div class="chart-box">
        <h3>Cigarros por Semana</h3>
        <canvas id="chart4Semanas"></canvas>
    </div>

    <script>
        const dados = JSON.parse(localStorage.getItem('dadosCigarros')) || {};
        const DATA_CORTA = "2026-04-01";
        const HORAS_ATIVAS = 19; 

        function inicializar() {
            let manha = 0, tarde = 0, noite = 0, maxInt = 0, dataRec = "--/--";
            let semanas = [0, 0, 0, 0];

            Object.keys(dados).forEach(data => {
                if(data >= DATA_CORTA) {
                    const dia = dados[data];
                    if(dia.horas) {
                        dia.horas.forEach(h => {
                            const hr = parseInt(h.split(':')[0]);
                            if(hr >= 5 && hr < 12) manha++;
                            else if(hr >= 12 && hr < 20) tarde++;
                            else if(hr >= 20) noite++;
                        });
                    }
                    let totalValido = dia.horas ? dia.horas.filter(h => parseInt(h.split(':')[0]) >= 5).length : dia.total;
                    let int = totalValido > 1 ? (HORAS_ATIVAS / (totalValido - 1)) : HORAS_ATIVAS;
                    if(int >= maxInt) { maxInt = int; dataRec = data.split('-').reverse().join('/'); }

                    let diff = Math.floor((new Date() - new Date(data)) / (1000*60*60*24));
                    if(diff < 7) semanas[3] += totalValido;
                    else if(diff < 14) semanas[2] += totalValido;
                    else if(diff < 21) semanas[1] += totalValido;
                    else if(diff < 28) semanas[0] += totalValido;
                }
            });

            document.getElementById('pb-value').innerText = maxInt.toFixed(1) + "h";
            document.getElementById('pb-data').innerHTML = "Data do recorde:<br><strong>" + dataRec + "</strong>";
            
            new Chart(document.getElementById('chartDonut'), { type: 'doughnut', data: { labels: ['Manhã', 'Tarde', 'Noite'], datasets: [{ data: [manha, tarde, noite], backgroundColor: ['#2ecc71', '#f1c40f', '#e74c3c'], borderWidth: 0 }] }, options: { cutout: '70%', plugins: { legend: { position: 'bottom', labels: { color: '#888', font: { size: 10 } } } } } });
            new Chart(document.getElementById('chart4Semanas'), { type: 'bar', data: { labels: ['3 Sem.', '2 Sem.', 'Passada', 'ESTA'], datasets: [{ data: semanas, backgroundColor: (c) => c.dataIndex === 3 ? '#3498db' : '#555', borderRadius: 6 }] }, options: { plugins: { legend: { display: false } } } });
            
            const msg = document.getElementById('msg-periodo');
            if(noite >= manha && noite >= tarde && noite > 0) msg.innerText = "Foco necessário à noite 🌙";
            else if(tarde >= manha && tarde >= noite && tarde > 0) msg.innerText = "Foco necessário à tarde 🍴";
            else if(manha > 0) msg.innerText = "Atenção ao café da manhã ☕";
        }
        inicializar();
    </script>
</body>
</html>
