<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progresso - Controlo</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #1a1a1a; --card: #2d2d2d; --txt: #eee; --blue: #3498db; --p: #2ecc71; --danger: #e74c3c; --gold: #f1c40f; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .header { width: 100%; max-width: 400px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-voltar { background: #444; color: white; padding: 8px 20px; border-radius: 12px; text-decoration: none; font-size: 0.9rem; }

        .record-card { background: linear-gradient(135deg, #3a3a3a, #2d2d2d); width: 100%; max-width: 400px; padding: 25px; border-radius: 30px; text-align: center; margin-bottom: 20px; border: 1px solid #444; }
        .record-value { font-size: 2.2rem; font-weight: 800; color: var(--gold); margin: 5px 0; }
        .record-label { font-size: 0.75rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }

        .chart-box { background: var(--card); width: 100%; max-width: 400px; padding: 20px; border-radius: 25px; margin-bottom: 20px; box-sizing: border-box; }
        h3 { font-size: 0.8rem; margin-top: 0; color: #888; text-align: center; text-transform: uppercase; margin-bottom: 20px; }
        
        .info-box { text-align: center; padding: 15px; border-radius: 20px; background: rgba(255,255,255,0.05); margin-top: 15px; font-weight: bold; font-size: 0.9rem; }
        .trend-down { color: var(--p); }
        .trend-up { color: var(--danger); }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="font-size: 1.2rem;">O Teu Progresso</h2>
        <a href="stats.html" class="btn-voltar">Voltar</a>
    </div>

    <div class="record-card">
        <span style="font-size: 2rem;">🏆</span><br>
        <span class="record-label">Maior Tempo Sem Fumar</span>
        <div id="pb-value" class="record-value">0h 0m</div>
        <small style="color: #666;">Recorde histórico (base 16h)</small>
    </div>

    <div class="chart-box">
        <h3>Cigarros por Semana (Último Mês)</h3>
        <canvas id="chart4Semanas" style="max-height: 250px;"></canvas>
        <div id="msg-evolucao" class="info-box">A analisar tendências...</div>
    </div>

    <script>
        const dados = JSON.parse(localStorage.getItem('dadosCigarros')) || {};
        const HORAS_ATIVAS = 16;

        function calcular() {
            let totaisSemanas = [0, 0, 0, 0]; // [3 semanas atrás, 2 atrás, passada, esta]
            let maxIntervalo = 0;

            // Processar últimos 28 dias (4 semanas)
            for(let i=0; i<28; i++) {
                let d = new Date();
                d.setDate(d.getDate() - i);
                let dataIso = d.toISOString().split('T')[0];
                let qtd = (dados[dataIso] ? dados[dataIso].total : 0);
                
                // Atribuir à semana correspondente
                if (i < 7) totaisSemanas[3] += qtd;      // Esta semana
                else if (i < 14) totaisSemanas[2] += qtd; // Semana passada
                else if (i < 21) totaisSemanas[1] += qtd; // 2 semanas atrás
                else if (i < 28) totaisSemanas[0] += qtd; // 3 semanas atrás

                // Recorde (baseado em qualquer dia do histórico)
                let intervaloDia = qtd > 1 ? (HORAS_ATIVAS / (qtd - 1)) : HORAS_ATIVAS;
                if (intervaloDia > maxIntervalo) maxIntervalo = intervaloDia;
            }

            document.getElementById('pb-value').innerText = maxIntervalo.toFixed(1) + "h";
            renderizar(totaisSemanas);
        }

        function renderizar(semanas) {
            new Chart(document.getElementById('chart4Semanas'), {
                type: 'bar',
                data: {
                    labels: ['3 Sem.', '2 Sem.', 'Passada', 'ESTA'],
                    datasets: [{
                        data: semanas,
                        backgroundColor: (context) => {
                            const index = context.dataIndex;
                            return index === 3 ? '#3498db' : '#555'; // Azul para a atual, cinza para as outras
                        },
                        borderRadius: 8
                    }]
                },
                options: {
                    plugins: { legend: { display: false } },
                    scales: { 
                        y: { beginAtZero: true, grid: { color: '#333' } },
                        x: { grid: { display: false }, ticks: { color: '#eee' } }
                    }
                }
            });

            // Lógica de mensagem: comparar esta semana com a anterior
            const msg = document.getElementById('msg-evolucao');
            const atual = semanas[3];
            const passada = semanas[2];

            if (passada > 0) {
                const diff = ((atual - passada) / passada) * 100;
                if (diff < 0) {
                    msg.innerHTML = `<span class="trend-down">📉 Menos ${Math.abs(diff).toFixed(0)}% que a semana anterior!</span>`;
                } else if (diff > 0) {
                    msg.innerHTML = `<span class="trend-up">⚠️ Subiu ${diff.toFixed(0)}%. Mantém o foco!</span>`;
                } else {
                    msg.innerText = "📈 Mantiveste o ritmo da semana passada.";
                }
            } else {
                msg.innerText = "A comparar com semanas anteriores...";
            }
        }

        calcular();
    </script>
</body>
</html>
