<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progresso - Controlo</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #1a1a1a; --card: #2d2d2d; --txt: #eee; --blue: #3498db; --p: #2ecc71; --danger: #e74c3c; --gold: #f1c40f; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .header { width: 100%; max-width: 400px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-voltar { background: #444; color: white; padding: 8px 20px; border-radius: 12px; text-decoration: none; font-size: 0.9rem; }

        .record-card { background: linear-gradient(135deg, #3a3a3a, #2d2d2d); width: 100%; max-width: 400px; padding: 25px; border-radius: 30px; text-align: center; margin-bottom: 20px; border: 1px solid #444; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .record-value { font-size: 2.2rem; font-weight: 800; color: var(--gold); margin: 5px 0; }
        .record-label { font-size: 0.75rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }

        .chart-box { background: var(--card); width: 100%; max-width: 400px; padding: 20px; border-radius: 25px; margin-bottom: 20px; box-sizing: border-box; }
        h3 { font-size: 0.9rem; margin-top: 0; color: #888; text-align: center; text-transform: uppercase; margin-bottom: 20px; }
        
        .info-box { text-align: center; padding: 15px; border-radius: 20px; background: rgba(255,255,255,0.05); margin-top: 15px; font-weight: bold; font-size: 0.95rem; }
        .trend-down { color: var(--p); }
        .trend-up { color: var(--danger); }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="font-size: 1.2rem;">O Teu Progresso</h2>
        <a href="stats.html" class="btn-voltar">Voltar</a>
    </div>

    <div class="record-card">
        <span style="font-size: 2rem;">🏆</span><br>
        <span class="record-label">Maior Tempo Sem Fumar</span>
        <div id="pb-value" class="record-value">0h 0m</div>
        <small style="color: #666;" id="data-recorde">Recorde histórico</small>
    </div>

    <div class="chart-box">
        <h3>Semana Passada vs Esta Semana</h3>
        <canvas id="chartComp" style="max-height: 250px;"></canvas>
        <div id="msg-comp" class="info-box">A calcular evolução...</div>
    </div>

    <script>
        const dados = JSON.parse(localStorage.getItem('dadosCigarros')) || {};
        const HORAS_ATIVAS = 16;

        function calcular() {
            let estaSemana = 0;
            let semanaPassada = 0;
            let maxIntervalo = 0;

            // Datas para o cálculo das duas semanas
            for(let i=0; i<14; i++) {
                let d = new Date();
                d.setDate(d.getDate() - i);
                let dataIso = d.toISOString().split('T')[0];
                let qtd = (dados[dataIso] ? dados[dataIso].total : 0);
                
                if (i < 7) {
                    estaSemana += qtd;
                } else {
                    semanaPassada += qtd;
                }

                // Cálculo do melhor intervalo do histórico (Recorde)
                let intervaloDia = qtd > 1 ? (HORAS_ATIVAS / (qtd - 1)) : HORAS_ATIVAS;
                if (intervaloDia > maxIntervalo) maxIntervalo = intervaloDia;
            }

            document.getElementById('pb-value').innerText = maxIntervalo.toFixed(1) + "h";
            renderizar(estaSemana, semanaPassada);
        }

        function renderizar(atual, passada) {
            new Chart(document.getElementById('chartComp'), {
                type: 'bar',
                data: {
                    labels: ['PASSADA', 'ESTA'],
                    datasets: [{
                        label: 'Cigarros',
                        data: [passada, atual],
                        backgroundColor: ['#e74c3c', '#3498db'], // Vermelho vs Azul como na imagem
                        borderRadius: 10,
                        barThickness: 50
                    }]
                },
                options: {
                    plugins: { legend: { display: false } },
                    scales: { 
                        y: { 
                            beginAtZero: true, 
                            grid: { color: '#333' },
                            ticks: { color: '#888' }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#eee', font: { weight: 'bold' } }
                        }
                    }
                }
            });

            const msg = document.getElementById('msg-comp');
            if(passada > 0) {
                const diff = ((atual - passada) / passada) * 100;
                if(diff < 0) {
                    msg.innerHTML = `<span class="trend-down">📈 Menos ${Math.abs(diff).toFixed(0)}% que a semana passada</span>`;
                } else if(diff > 0) {
                    msg.innerHTML = `<span class="trend-up">⚠️ Subiu ${diff.toFixed(0)}% esta semana</span>`;
                } else {
                    msg.innerText = "📈 Mantiveste o mesmo ritmo!";
                }
            } else {
                msg.innerText = "A recolher dados...";
            }
        }

        calcular();
    </script>
</body>
</html>
