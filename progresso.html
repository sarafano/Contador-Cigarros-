<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progresso - Controlo</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #1a1a1a; --card: #2d2d2d; --txt: #eee; --blue: #3498db; --p: #2ecc71; --danger: #e74c3c; --tarde: #f1c40f; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { width: 100%; max-width: 450px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-voltar { background: #444; color: white; padding: 8px 20px; border-radius: 12px; text-decoration: none; font-size: 0.9rem; }
        .pb-container { background: #252525; width: 100%; max-width: 450px; padding: 20px; border-radius: 25px; text-align: center; margin-bottom: 20px; border: 1px solid #333; box-sizing: border-box; }
        .pb-card { background: linear-gradient(145deg, #a8704d, #7a4a2e); padding: 30px 20px; border-radius: 25px; position: relative; margin: 0 auto 10px auto; width: 85%; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .pb-time { font-size: 2.2rem; font-weight: 800; color: white; margin: 10px 0; }
        .chart-box { background: var(--card); width: 100%; max-width: 450px; padding: 20px; border-radius: 25px; margin-bottom: 20px; box-sizing: border-box; }
        h3 { font-size: 0.8rem; color: #888; text-align: center; text-transform: uppercase; margin-bottom: 15px; }
        .custom-legend { display: flex; justify-content: center; gap: 10px; font-size: 0.7rem; color: #aaa; margin-bottom: 15px; flex-wrap: wrap; }
        .dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>
    <div class="header">
        <h2 style="font-size: 1.1rem; margin: 0;">Análise de Progresso</h2>
        <a href="index.html" class="btn-voltar">Voltar</a>
    </div>

    <div class="pb-container">
        <div class="pb-card">
            <span style="font-size:2rem; position:absolute; top:-15px; left:46%;">🏆</span>
            <div style="font-size:0.7rem; font-weight:bold; color:rgba(255,255,255,0.8)">MAIOR TEMPO LIMPO</div>
            <div id="pb-value" class="pb-time">0h</div>
            <span style="position:absolute; bottom:10px; right:15px; color:#2ecc71; font-size:1.2rem;">✔</span>
        </div>
        <div id="pb-data" style="font-size:0.8rem; color:#888">Recorde Histórico</div>
    </div>

    <div class="chart-box">
        <h3>Evolução por Período</h3>
        <div class="custom-legend">
            <div><span class="dot" style="background:#2ecc71"></span>Manhã</div>
            <div><span class="dot" style="background:#f1c40f"></span>Tarde</div>
            <div><span class="dot" style="background:#e74c3c"></span>Noite</div>
        </div>
        <canvas id="chartPeriodos" style="max-height: 220px;"></canvas>
    </div>

    <div class="chart-box">
        <h3>Cigarros Totais por Semana</h3>
        <canvas id="chart4Semanas" style="max-height: 180px;"></canvas>
    </div>

    <script>
        const dados = JSON.parse(localStorage.getItem('dadosCigarros')) || {};

        function inicializar() {
            let maxHorasLimpo = 0;
            let dataRecorde = "";
            let semanas = [0, 0, 0, 0];
            
            let diasLabels = [];
            let mData = [], tData = [], nData = [];

            // 1. Processar Recorde e Semanas (Lógica de datas reais)
            const todasDatas = Object.keys(dados).sort();
            
            todasDatas.forEach((dataStr, index) => {
                const dia = dados[dataStr];
                const totalCigs = dia.total || 0;
                
                // Contagem Semanal
                const diffDias = Math.floor((new Date() - new Date(dataStr)) / (1000 * 60 * 60 * 24));
                if(diffDias < 7) semanas[3] += totalCigs;
                else if(diffDias < 14) semanas[2] += totalCigs;
                else if(diffDias < 21) semanas[1] += totalCigs;
                else if(diffDias < 28) semanas[0] += totalCigs;

                // Cálculo de Recorde (Intervalo entre dias)
                if (index > 0) {
                    const dataAtual = new Date(dataStr);
                    const dataAnterior = new Date(todasDatas[index-1]);
                    const diffHoras = Math.floor((dataAtual - dataAnterior) / (1000 * 60 * 60));
                    if (diffHoras > maxHorasLimpo) {
                        maxHorasLimpo = diffHoras;
                        dataRecorde = dataStr;
                    }
                }
            });

            // 2. Preparar Gráfico de Períodos (Últimos 5 dias)
            for(let i=4; i>=0; i--) {
                let d = new Date();
                d.setDate(d.getDate() - i);
                let iso = d.toISOString().split('T')[0];
                diasLabels.push(iso.substring(8,10) + "/" + iso.substring(5,7));

                let m=0, t=0, n=0;
                if(dados[iso] && dados[iso].horas) {
                    dados[iso].horas.forEach(h => {
                        let hr = parseInt(h.split(':')[0]);
                        if(hr >= 5 && hr < 12) m++;
                        else if(hr >= 12 && hr < 20) t++;
                        else if(hr >= 20) n++;
                    });
                }
                mData.push(m); tData.push(t); nData.push(n);
            }

            // Exibir Valores na Interface
            document.getElementById('pb-value').innerText = maxHorasLimpo + "h";
            document.getElementById('pb-data').innerText = "Data do recorde: " + (dataRecorde.split('-').reverse().join('/') || "N/A");

            // Renderizar Gráficos
            new Chart(document.getElementById('chartPeriodos'), {
                type: 'bar',
                data: {
                    labels: diasLabels,
                    datasets: [
                        { label: 'Manhã', data: mData, backgroundColor: '#2ecc71', borderRadius: 4 },
                        { label: 'Tarde', data: tData, backgroundColor: '#f1c40f', borderRadius: 4 },
                        { label: 'Noite', data: nData, backgroundColor: '#e74c3c', borderRadius: 4 }
                    ]
                },
                options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: '#333' } }, x: { grid: { display: false } } } }
            });

            new Chart(document.getElementById('chart4Semanas'), {
                type: 'bar',
                data: {
                    labels: ['3 Sem.', '2 Sem.', 'Passada', 'ESTA'],
                    datasets: [{ data: semanas, backgroundColor: (c) => c.dataIndex === 3 ? '#3498db' : '#555', borderRadius: 6 }]
                },
                options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: '#333' } } } }
            });
        }
        inicializar();
    </script>
</body>
</html>
