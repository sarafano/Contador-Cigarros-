<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #1a1a1a; color: white; font-family: -apple-system, sans-serif; padding: 15px; margin: 0; overflow: hidden; }
        .container { background: #2d2d2d; border-radius: 25px; padding: 20px; height: 260px; box-sizing: border-box; }
        h3 { font-size: 0.8rem; color: #888; text-align: center; text-transform: uppercase; margin: 0 0 15px 0; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="container">
        <h3>Cigarros Totais por Semana</h3>
        <canvas id="chart"></canvas>
    </div>

    <script>
        const dados = JSON.parse(localStorage.getItem('dadosCigarros')) || {};
        const hoje = new Date();
        
        // Criar 4 baldes para as semanas (0=esta, 1=passada, 2=ante-passada, 3=há 3 semanas)
        let contagemSemanas = [0, 0, 0, 0];

        Object.keys(dados).forEach(dataStr => {
            const dataObj = new Date(dataStr);
            // Calcular diferença de dias
            const diffDias = Math.floor((hoje - dataObj) / (1000 * 60 * 60 * 24));
            const total = dados[dataStr].total || 0;

            if (diffDias >= 0 && diffDias < 7) contagemSemanas[0] += total;
            else if (diffDias >= 7 && diffDias < 14) contagemSemanas[1] += total;
            else if (diffDias >= 14 && diffDias < 21) contagemSemanas[2] += total;
            else if (diffDias >= 21 && diffDias < 28) contagemSemanas[3] += total;
        });

        // Inverter para mostrar da mais antiga para a mais atual (esquerda para a direita)
        const dataGrafico = [contagemSemanas[3], contagemSemanas[2], contagemSemanas[1], contagemSemanas[0]];

        new Chart(document.getElementById('chart'), {
            type: 'bar',
            data: {
                labels: ['3 Sem.', '2 Sem.', 'Passada', 'ESTA'],
                datasets: [{
                    data: dataGrafico,
                    backgroundColor: (context) => {
                        return context.dataIndex === 3 ? '#3498db' : '#555'; // Azul para a atual, cinza para as outras
                    },
                    borderRadius: 8,
                    barThickness: 35
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { 
                        beginAtZero: true, 
                        grid: { color: '#3d3d3d' },
                        ticks: { color: '#888', font: { size: 10 } }
                    },
                    x: { 
                        grid: { display: false },
                        ticks: { color: '#fff', font: { size: 10, weight: 'bold' } }
                    }
                }
            }
        });
    </script>
</body>
</html>
