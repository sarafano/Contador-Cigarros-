<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estatísticas Avançadas v13</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #f8f9fa; --txt: #2c3e50; --blue: #3498db; --card: white; --p: #2ecc71; --danger: #e74c3c; }
        @media (prefers-color-scheme: dark) { :root { --bg: #1a1a1a; --txt: #eee; --card: #2d2d2d; } }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--txt); padding: 20px; margin: 0; padding-bottom: 50px; }
        
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; }
        .btn-back { background: var(--blue); color: white; padding: 10px 20px; border-radius: 15px; text-decoration: none; font-weight: bold; font-size: 0.9rem; border: none; }
        
        .card { background: var(--card); padding: 20px; border-radius: 25px; margin-bottom: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        h2 { font-size: 0.8rem; text-transform: uppercase; color: #888; margin: 0 0 15px 0; letter-spacing: 1px; }
        .chart-box { height: 220px; position: relative; }
        
        .grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-item { background: var(--card); padding: 15px; border-radius: 20px; text-align: center; }
        .stat-item small { font-size: 0.65rem; color: #888; display: block; }
        .stat-item b { font-size: 1.1rem; color: var(--blue); }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="font-size: 1.3rem; margin: 0;">Dashboard</h1>
        <a href="index.html" class="btn-back">← Voltar</a>
    </div>

    <div class="grid-stats">
        <div class="stat-item">
            <small>ESTE MÊS</small>
            <b id="total-mes">0</b>
        </div>
        <div class="stat-item">
            <small>POUPANÇA POTENCIAL</small>
            <b id="poupanca" style="color: var(--p);">0€</b>
        </div>
    </div>

    <div class="card">
        <h2>Tendência (Últimos 7 dias)</h2>
        <div class="chart-box"><canvas id="chartSemanal"></canvas></div>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2>Análise de Gatilhos</h2>
            <select id="seletorMes" onchange="atualizarTudo()" style="border:none; background:rgba(0,0,0,0.05); padding:5px; border-radius:8px; color:var(--blue); font-weight:bold;"></select>
        </div>
        <div class="chart-box" style="height: 250px;"><canvas id="chartGatilhos"></canvas></div>
    </div>

    <div class="card">
        <h2>Distribuição por Período</h2>
        <div class="chart-box"><canvas id="chartPeriodos"></canvas></div>
    </div>

    <script>
        const PRECO = 0.25;
        let dados = JSON.parse(localStorage.getItem('dadosCigarros')) || {};
        let charts = {};

        function atualizarTudo() {
            const mesSel = document.getElementById('seletorMes').value;
            let totalMes = 0;
            let gatilhos = {};

            Object.keys(dados).filter(d => d.startsWith(mesSel)).forEach(d => {
                totalMes += dados[d].total;
                for (let [g, q] of Object.entries(dados[d].gatilhos)) {
                    gatilhos[g] = (gatilhos[g] || 0) + q;
                }
            });

            document.getElementById('total-mes').innerText = totalMes;
            document.getElementById('poupanca').innerText = (totalMes * PRECO).toFixed(2) + "€";

            renderGatilhos(gatilhos);
            renderPeriodos(gatilhos); // Usa os gatilhos como base de exemplo
        }

        function renderSemanal() {
            const ctx = document.getElementById('chartSemanal').getContext('2d');
            let labels = []; let valores = [];
            for (let i = 6; i >= 0; i--) {
                let d = new Date(); d.setDate(d.getDate() - i);
                let iso = d.toISOString().split('T')[0];
                labels.push(d.getDate() + "/" + (d.getMonth()+1));
                valores.push(dados[iso] ? dados[iso].total : 0);
            }
            new Chart(ctx, {
                type: 'line',
                data: { 
                    labels, 
                    datasets: [{ 
                        label: 'Cigarros', 
                        data: valores, 
                        borderColor: '#3498db', 
                        backgroundColor: 'rgba(52, 152, 219, 0.1)', 
                        fill: true,
                        tension: 0.4,
                        borderWidth: 3,
                        pointRadius: 4
                    }] 
                },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        function renderGatilhos(obj) {
            const ctx = document.getElementById('chartGatilhos').getContext('2d');
            if (charts.g) charts.g.destroy();
            charts.g = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(obj),
                    datasets: [{
                        data: Object.values(obj),
                        backgroundColor: ['#3498db', '#f1c40f', '#e74c3c', '#9b59b6', '#2ecc71'],
                        borderWidth: 0
                    }]
                },
                options: { 
                    maintainAspectRatio: false, 
                    plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } } } 
                }
            });
        }

        function renderPeriodos(obj) {
            const ctx = document.getElementById('chartPeriodos').getContext('2d');
            if (charts.p) charts.p.destroy();
            // Exemplo de labels fixos - no futuro podes registar a hora real
            charts.p = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Manhã', 'Almoço', 'Tarde', 'Noite'],
                    datasets: [{
                        data: [
                            obj['Café'] || 0, 
                            obj['Pós-refeição'] || 0, 
                            obj['Stress'] || obj['Tédio'] || 0, 
                            obj['Hábito'] || 0
                        ],
                        backgroundColor: 'rgba(46, 204, 113, 0.6)',
                        borderRadius: 5
                    }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        // Inicialização
        const meses = [...new Set(Object.keys(dados).map(d => d.substring(0, 7)))].sort().reverse();
        if(meses.length > 0) {
            document.getElementById('seletorMes').innerHTML = meses.map(m => `<option value="${m}">${m}</option>`).join('');
            renderSemanal();
            atualizarTudo();
        }
    </script>
</body>
</html>
