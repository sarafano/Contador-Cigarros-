<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análise - Controlo de Tabaco</title>
    <style>
        :root { --bg: #1a1a1a; --card: #2d2d2d; --txt: #eee; --blue: #3498db; --danger: #e74c3c; --p: #2ecc71; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .header { width: 100%; max-width: 400px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        h1 { margin: 0; font-size: 1.5rem; }
        .btn-voltar { background: var(--blue); color: white; padding: 10px 25px; border-radius: 15px; text-decoration: none; font-weight: bold; }

        .grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 400px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 25px; text-align: center; }
        .stat-label { font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; display: block; }
        .stat-value { font-size: 1.4rem; font-weight: bold; }
        
        .val-blue { color: var(--blue); }
        .val-danger { color: var(--danger); }
    </style>
</head>
<body>

    <div class="header">
        <h1>Análise</h1>
        <a href="index.html" class="btn-voltar">Voltar</a>
    </div>

    <div class="grid-stats">
        <div class="stat-card">
            <span class="stat-label">Tempo a Fumar (Mês)</span>
            <div id="tempo-fumar" class="stat-value val-danger">0h 0m</div>
        </div>

        <div class="stat-card">
            <span class="stat-label">Gasto Mês</span>
            <div id="gasto-mes" class="stat-value val-blue">0.00€</div>
        </div>

        <div class="stat-card">
            <span class="stat-label">Média Anual (Dia)</span>
            <div id="media-anual" class="stat-value val-blue">0.0</div>
        </div>

        <div class="stat-card">
            <span class="stat-label">Projeção Ano</span>
            <div id="projecao-ano" class="stat-value val-danger">0€</div>
        </div>
    </div>

    <script>
        const PRECO = 0.25; // Preço por cigarro
        const MINUTOS_POR_CIGARRO = 3;
        const dados = JSON.parse(localStorage.getItem('dadosCigarros')) || {};
        
        function calcularEstatisticas() {
            const agora = new Date();
            const mesAtual = agora.toISOString().substring(0, 7);
            const anoAtual = agora.getFullYear().toString();
            
            let totalCigarrosMes = 0;
            let totalCigarrosAno = 0;
            let diasComRegistoNoAno = 0;

            Object.keys(dados).forEach(data => {
                const qtd = dados[data].total || 0;
                
                // Soma para o mês atual
                if (data.startsWith(mesAtual)) {
                    totalCigarrosMes += qtd;
                }
                
                // Soma para o ano atual
                if (data.startsWith(anoAtual)) {
                    totalCigarrosAno += qtd;
                    if (qtd > 0) diasComRegistoNoAno++;
                }
            });

            // 1. Tempo gasto a fumar no mês (Total cigarros * 3 min)
            const minutosTotais = totalCigarrosMes * MINUTOS_POR_CIGARRO;
            const horas = Math.floor(minutosTotais / 60);
            const mins = minutosTotais % 60;
            document.getElementById('tempo-fumar').innerText = `${horas}h ${mins}m`;

            // 2. Gasto Mês
            document.getElementById('gasto-mes').innerText = (totalCigarrosMes * PRECO).toFixed(2) + "€";

            // 3. Média Anual de cigarros por dia
            // Dividimos pelo número de dias que têm registo ou pelo total de dias do ano decorridos
            const mediaDiariaAno = diasComRegistoNoAno > 0 ? (totalCigarrosAno / diasComRegistoNoAno) : 0;
            document.getElementById('media-anual').innerText = mediaDiariaAno.toFixed(1);

            // 4. Projeção Anual de Gastos
            // Cálculo baseado na média diária atual multiplicada por 365 dias
            const projecaoFinanceira = mediaDiariaAno * 365 * PRECO;
            document.getElementById('projecao-ano').innerText = Math.round(projecaoFinanceira) + "€";
        }

        calcularEstatisticas();
    </script>
</body>
</html>
