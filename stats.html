<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estatísticas Avançadas v12</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #f8f9fa; --txt: #2c3e50; --blue: #3498db; --card: white; --p: #2ecc71; }
        @media (prefers-color-scheme: dark) { :root { --bg: #1a1a1a; --txt: #eee; --card: #2d2d2d; } }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--txt); padding: 20px; margin: 0; }
        
        .header { display: flex; align-items: center; margin-bottom: 20px; justify-content: space-between; }
        .btn-back { background: var(--blue); color: white; padding: 10px 20px; border-radius: 15px; text-decoration: none; font-weight: bold; }

        /* Sistema de Abas */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { background: rgba(0,0,0,0.05); border: none; padding: 10px 15px; border-radius: 12px; color: var(--txt); font-weight: bold; white-space: nowrap; cursor: pointer; }
        .tab-btn.active { background: var(--blue); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .card { background: var(--card); padding: 20px; border-radius: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .chart-box { height: 250px; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="font-size: 1.2rem; margin: 0;">Estatísticas</h1>
        <a href="index.html" class="btn-back">Sair</a>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'tab-resumo')">Resumo</button>
        <button class="tab-btn" onclick="openTab(event, 'tab-semanal')">Semanal</button>
        <button class="tab-btn" onclick="openTab(event, 'tab-gatilhos')">Gatilhos</button>
    </div>

    <div id="tab-resumo" class="tab-content active">
        <div class="card">
            <h2 style="font-size: 0.8rem; color: #888;">IMPACTO ESTE MÊS</h2>
            <div id="resumo-texto" style="line-height: 2;">
                </div>
        </div>
    </div>

    <div id="tab-semanal" class="tab-content">
        <div class="card">
            <h2 style="font-size: 0.8rem; color: #888;">ÚLTIMOS 7 DIAS</h2>
            <div class="chart-box"><canvas id="graficoSemanal"></canvas></div>
        </div>
    </div>

    <div id="tab-gatilhos" class="tab-content">
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items: center; margin-bottom: 15px;">
                <h2 style="font-size: 0.8rem; color: #888; margin:0;">PORQUÊ?</h2>
                <select id="seletorMes" onchange="atualizarEstatisticas()"></select>
            </div>
            <div class="chart-box"><canvas id="graficoGatilhos"></canvas></div>
        </div>
    </div>

    <script>
        const PRECO = 0.25; const MIN_CIG = 11;
        let dados = JSON.parse(localStorage.getItem('dadosCigarros')) || {};
        let chartG = null;

        function openTab(evt, tabName) {
            let i, content, btns;
            content = document.getElementsByClassName("tab-content");
            for (i = 0; i < content.length; i++) content[i].classList.remove("active");
            btns = document.getElementsByClassName("tab-btn");
            for (i = 0; i < btns.length; i++) btns[i].classList.remove("active");
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
        }

        function atualizarEstatisticas() {
            const mesSel = document.getElementById('seletorMes').value;
            let totalMes = 0; let gatilhosMes = {}; let dias = 0;
            
            Object.keys(dados).filter(d => d.startsWith(mesSel)).forEach(d => {
                totalMes += dados[d].total; dias++;
                for (let [g, q] of Object.entries(dados[d].gatilhos)) { gatilhosMes[g] = (gatilhosMes[g] || 0) + q; }
            });

            const media = (totalMes / (dias || 1)).toFixed(1);
            document.getElementById('resumo-texto').innerHTML = `
                💰 Gasto: <b>${(totalMes * PRECO).toFixed(2)}€</b><br>
                ⏳ Vida perdida: <b>${Math.floor(totalMes * MIN_CIG / 60)}h</b><br>
                📈 Média diária: <b>${media} cigs</b><br>
                🔮 Projeção Ano: <b>${(media * 365 * PRECO).toFixed(0)}€</b>
            `;
            renderGatilhos(gatilhosMes);
        }

        function renderSemanal() {
            const ctx = document.getElementById('graficoSemanal').getContext('2d');
            let labels = []; let valores = [];
            for (let i = 6; i >= 0; i--) {
                let d = new Date(); d.setDate(d.getDate() - i);
                let iso = d.toISOString().split('T')[0];
                labels.push(d.getDate() + "/" + (d.getMonth()+1));
                valores.push(dados[iso] ? dados[iso].total : 0);
            }
            new Chart(ctx, { type: 'bar', data: { labels, datasets: [{ data: valores, backgroundColor: '#3498db', borderRadius: 8 }] }, options: { maintainAspectRatio: false } });
        }

        function renderGatilhos(obj) {
            const ctx = document.getElementById('graficoGatilhos').getContext('2d');
            if (chartG) chartG.destroy();
            chartG = new Chart(ctx, { type: 'doughnut', data: { labels: Object.keys(obj), datasets: [{ data: Object.values(obj), backgroundColor: ['#3498db', '#f1c40f', '#e74c3c', '#9b59b6', '#2ecc71'] }] }, options: { maintainAspectRatio: false } });
        }

        const meses = [...new Set(Object.keys(dados).map(d => d.substring(0, 7)))].sort().reverse();
        document.getElementById('seletorMes').innerHTML = meses.map(m => `<option value="${m}">${m}</option>`).join('');

        renderSemanal();
        atualizarEstatisticas();
    </script>
</body>
</html>
