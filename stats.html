<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estatísticas Detalhadas</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #1a1a1a; --card: #2d2d2d; --txt: #eee; --blue: #3498db; --green: #2ecc71; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { width: 100%; max-width: 400px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-voltar { background: #444; color: white; padding: 8px 20px; border-radius: 12px; text-decoration: none; font-size: 0.9rem; }
        .stats-grid { width: 100%; max-width: 400px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 15px; text-align: center; }
        .stat-label { font-size: 0.65rem; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        .stat-value { font-size: 1.2rem; font-weight: bold; color: var(--blue); }
        .chart-box { background: var(--card); width: 100%; max-width: 400px; padding: 20px; border-radius: 25px; margin-bottom: 20px; box-sizing: border-box; }
        h3 { font-size: 0.75rem; color: #aaa; text-transform: uppercase; text-align: center; margin-bottom: 15px; }
        canvas { width: 100% !important; height: 200px !important; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="font-size: 1.1rem; margin: 0;">Estatísticas</h2>
        <a href="index.html" class="btn-voltar">Voltar</a>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">Gasto este mês</div>
            <div id="gastoMes" class="stat-value">0.00€</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Tempo a fumar</div>
            <div id="tempoFumar" class="stat-value" style="color:#e74c3c">0h 0m</div>
        </div>
    </div>

    <div class="chart-box">
        <h3>GASTO POR MÊS (€)</h3>
        <canvas id="chartGastoMensal"></canvas>
    </div>

    <div class="chart-box">
        <h3>CIGARROS POR MÊS</h3>
        <canvas id="chartCigarrosMensal"></canvas>
    </div>

    <div class="chart-box">
        <h3>ÚLTIMOS 7 DIAS (CIGS)</h3>
        <canvas id="chartUltimos7Dias"></canvas>
    </div>

    <div class="chart-box">
        <h3>TEMPO MÉDIO SEM FUMAR (H)</h3>
        <canvas id="chartTempoMedio"></canvas>
    </div>

    <script>
        const dados = JSON.parse(localStorage.getItem('dadosCigarros')) || {};

        // --- Lógica de Processamento ---
        const mesesLabels = [];
        const cigarrosMensais = {};
        const gastosMensais = {};
        
        const diasLabels = [];
        const cigarrosDiarios = [];
        const tempoMedioDiario = [];

        // Prepara dados Mensais
        Object.keys(dados).sort().forEach(data => {
            const mes = data.substring(0, 7); // "2026-04"
            if (!gastosMensais[mes]) {
                gastosMensais[mes] = 0;
                cigarrosMensais[mes] = 0;
            }
            cigarrosMensais[mes] += (dados[data].total || 0);
            gastosMensais[mes] += (dados[data].total || 0) * 0.22; // Exemplo: 0.22€ por cigarro
        });

        // Prepara dados dos Últimos 7 Dias
        for (let i = 6; i >= 0; i--) {
            let d = new Date();
            d.setDate(d.getDate() - i);
            let s = d.toISOString().split('T')[0];
            diasLabels.push(s.substring(8,10) + '/' + s.substring(5,7));
            
            let totalDia = dados[s] ? dados[s].total : 0;
            cigarrosDiarios.push(totalDia);

            // Cálculo do Tempo Médio (H)
            if (dados[s] && dados[s].horas && dados[s].horas.length > 1) {
                let mms = dados[s].horas.map(h => {
                    const [hrs, min] = h.split(':').map(Number);
                    return hrs * 60 + min;
                }).sort((a,b) => a-b);
                let diffs = 0;
                for(let j=1; j<mms.length; j++) diffs += (mms[j]-mms[j-1]);
                tempoMedioDiario.push((diffs/(mms.length-1)/60).toFixed(1));
            } else {
                tempoMedioDiario.push(0);
            }
        }

        // --- Renderização dos Gráficos ---

        // 1. Gasto Mensal (Verde)
        new Chart(document.getElementById('chartGastoMensal'), {
            type: 'bar',
            data: {
                labels: Object.keys(gastosMensais),
                datasets: [{ data: Object.values(gastosMensais), backgroundColor: '#2ecc71', borderRadius: 8 }]
            },
            options: { plugins: { legend: { display: false } } }
        });

        // 2. Cigarros Mensais (Verde - Novo)
        new Chart(document.getElementById('chartCigarrosMensal'), {
            type: 'bar',
            data: {
                labels: Object.keys(cigarrosMensais),
                datasets: [{ data: Object.values(cigarrosMensais), backgroundColor: '#2ecc71', borderRadius: 8 }]
            },
            options: { plugins: { legend: { display: false } } }
        });

        // 3. Últimos 7 Dias (Azul)
        new Chart(document.getElementById('chartUltimos7Dias'), {
            type: 'bar',
            data: {
                labels: diasLabels,
                datasets: [{ data: cigarrosDiarios, backgroundColor: '#3498db', borderRadius: 8 }]
            },
            options: { plugins: { legend: { display: false } } }
        });

        // 4. Tempo Médio (Linha Azul)
        new Chart(document.getElementById('chartTempoMedio'), {
            type: 'line',
            data: {
                labels: diasLabels,
                datasets: [{ 
                    data: tempoMedioDiario, 
                    borderColor: '#3498db', 
                    backgroundColor: 'rgba(52, 152, 219, 0.2)',
                    fill: true,
                    tension: 0.4,
                    pointRadius: 5
                }]
            },
            options: { plugins: { legend: { display: false } } }
        });

        // Atualiza os cartões de topo
        const mesAtual = new Date().toISOString().substring(0, 7);
        document.getElementById('gastoMes').innerText = (gastosMensais[mesAtual] || 0).toFixed(2) + "€";
    </script>
</body>
</html>
