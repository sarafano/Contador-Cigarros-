<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; margin: 0; height: 100vh; }
        .pb-card { background: linear-gradient(145deg, #a8704d, #7a4a2e); padding: 30px; border-radius: 25px; text-align: center; width: 85%; position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .pb-time { font-size: 2.5rem; font-weight: 800; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="pb-card">
        <span style="font-size:2rem; position:absolute; top:-15px; left:46%;">🏆</span>
        <div style="font-size:0.7rem; font-weight:bold; color:rgba(255,255,255,0.8)">MÉDIA DE TEMPO SEM FUMAR</div>
        <div id="valor" class="pb-time">...</div>
        <div style="font-size:0.8rem; color:rgba(255,255,255,0.6)">Desde 01/04/2026</div>
        <span style="position:absolute; bottom:10px; right:15px; color:#2ecc71; font-size:1.2rem;">✔</span>
    </div>

    <script>
        const dados = JSON.parse(localStorage.getItem('dadosCigarros')) || {};
        let momentos = [];
        Object.keys(dados).filter(d => d >= "2026-04-01").forEach(data => {
            if(dados[data].horas) {
                dados[data].horas.forEach(h => {
                    let d = new Date(data); d.setHours(h.split(':')[0], h.split(':')[1]);
                    momentos.push(d);
                });
            }
        });
        momentos.sort((a,b) => a-b);
        let totalH = 0;
        for(let i=1; i<momentos.length; i++) totalH += (momentos[i]-momentos[i-1])/3600000;
        const media = momentos.length > 1 ? (totalH/(momentos.length-1)).toFixed(1) : "0";
        document.getElementById('valor').innerText = media + "h";
    </script>
</body>
</html>
